        /* تأثيرات حركية (Animations) */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        .bounce {
            animation: bounceIcon 1s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* إخفاء العناصر */
        .hidden-view {
            display: none !important;
        }

        // --- المتغيرات وحالة التطبيق ---
        let currentSubject = null;
        let currentSubjectQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        // --- الوظائف الأساسية (Functions) ---

        // دالة لعرض قسم وإخفاء الباقي
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => {
                view.classList.add('hidden-view');
            });
            document.getElementById(viewId).classList.remove('hidden-view');
            
            // إظهار/إخفاء زر الرجوع للرئيسية
            const btnHome = document.getElementById('btn-home');
            if (viewId === 'view-home') {
                btnHome.classList.add('hidden-view');
            } else {
                btnHome.classList.remove('hidden-view');
            }
        }

        // دالة العودة للرئيسية
        function goHome() {
            currentSubject = null;
            showView('view-home');
        }

        // دالة مساعدة للحصول على رسالة عشوائية
        function getRandomMessage(type) {
            const messages = type === 'success' ? SUCCESS_MESSAGES : ERROR_MESSAGES;
            return messages[Math.floor(Math.random() * messages.length)];
        }

        // دالة اختيار المادة
        function selectSubject(subjectId) {
            const subject = SUBJECTS.find(s => s.id === subjectId);
            currentSubject = subject;
            
            if (QUESTIONS_DB[subjectId] && QUESTIONS_DB[subjectId].length > 0) {
                // المادة لها أسئلة
                currentSubjectQuestions = QUESTIONS_DB[subjectId];
                startQuiz();
            } else {
                // المادة ليس لها أسئلة بعد
                showView('view-coming-soon');
            }
        }

        // دالة بدء الاختبار
        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            showView('view-quiz');
            renderQuestion();
        }

        // دالة عرض السؤال الحالي
        function renderQuestion() {
            hasAnswered = false;
            const q = currentSubjectQuestions[currentQuestionIndex];
            const quizContainer = document.getElementById('view-quiz');
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button id="opt-${idx}" onclick="handleAnswer(${idx})" class="w-full text-right p-4 md:p-5 rounded-2xl border-2 border-slate-100 bg-white hover:border-orange-400 hover:bg-orange-50 text-slate-700 transition-all duration-200 font-bold text-lg mb-3 shadow-sm flex justify-between items-center group">
                        <span>${opt}</span>
                        <div id="icon-${idx}"></div>
                    </button>
                `;
            });

            quizContainer.innerHTML = `
                <div class="mb-6 flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <i class="fa-solid ${currentSubject.icon} text-orange-500"></i>
                        ${currentSubject.name}
                    </h2>
                    <div class="bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-sm font-bold">
                        سؤال ${currentQuestionIndex + 1} / ${currentSubjectQuestions.length}
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 md:p-8">
                        <h3 class="text-xl md:text-2xl font-bold leading-relaxed mb-8 text-slate-800">
                            ${q.question}
                        </h3>
                        <div>
                            ${optionsHtml}
                        </div>
                    </div>
                    <!-- مساحة رسالة التشجيع أو المواساة (مخفية في البداية) -->
                    <div id="feedback-container" class="hidden"></div>
                </div>
            `;
        }

        // دالة التعامل مع إجابة الطالب
        function handleAnswer(selectedIndex) {
            if (hasAnswered) return; // منع الإجابة أكثر من مرة للسؤال الواحد
            hasAnswered = true;

            const q = currentSubjectQuestions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.correctAnswer;
            const feedbackContainer = document.getElementById('feedback-container');

            // تلوين الأزرار
            q.options.forEach((opt, idx) => {
                const btn = document.getElementById(`opt-${idx}`);
                const iconContainer = document.getElementById(`icon-${idx}`);
                
                // إزالة التنسيقات الافتراضية
                btn.classList.remove('hover:border-orange-400', 'hover:bg-orange-50', 'bg-white', 'border-slate-100');
                btn.classList.add('cursor-default');

                if (idx === q.correctAnswer) {
                    // الإجابة الصحيحة دايماً باللون الأخضر
                    btn.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-2xl text-green-500"></i>';
                } else if (idx === selectedIndex && !isCorrect) {
                    // إذا اختار إجابة خاطئة
                    btn.classList.add('bg-red-50', 'border-red-400', 'text-red-700');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-2xl text-red-400"></i>';
                } else {
                    // باقي الإجابات
                    btn.classList.add('opacity-50', 'bg-slate-50', 'border-slate-200');
                }
            });

            if (isCorrect) score++;

            // عرض رسالة التشجيع ("أشطر كتكوت") أو المواساة
            const msgType = isCorrect ? 'success' : 'error';
            const msg = getRandomMessage(msgType);

            feedbackContainer.classList.remove('hidden');
            feedbackContainer.innerHTML = `
                <div class="p-6 md:p-8 border-t ${isCorrect ? 'bg-green-50 border-green-100' : 'bg-blue-50 border-blue-100'} animate-in fade-in slide-in-from-bottom-4 duration-300">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-6 text-center md:text-right">
                        <div class="flex flex-col md:flex-row items-center gap-4 text-xl font-bold">
                            ${isCorrect ? '<i class="fa-solid fa-face-laugh-beam text-green-500 text-5xl bounce"></i>' : '<i class="fa-solid fa-lightbulb text-blue-400 text-5xl animate-pulse"></i>'}
                            <span class="${isCorrect ? 'text-green-700' : 'text-blue-700'}">${msg}</span>
                        </div>
                        <button onclick="nextQuestion()" class="flex items-center justify-center gap-2 px-8 py-4 rounded-xl font-bold text-white transition-transform hover:scale-105 active:scale-95 shadow-md w-full md:w-auto ${isCorrect ? 'bg-green-500 hover:bg-green-600 shadow-green-500/30' : 'bg-blue-500 hover:bg-blue-600 shadow-blue-500/30'}">
                            ${currentQuestionIndex < currentSubjectQuestions.length - 1 ? 'السؤال اللي بعده' : 'النتيجة النهائية'}
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // دالة الانتقال للسؤال التالي أو النتيجة
        function nextQuestion() {
            if (currentQuestionIndex < currentSubjectQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        // دالة عرض النتيجة النهائية
        function showResult() {
            showView('view-result');
            const resultContainer = document.getElementById('view-result');
            const percentage = Math.round((score / currentSubjectQuestions.length) * 100);
            
            let resultMsg = "";
            let iconHtml = "";
            
            if (percentage >= 85) {
                resultMsg = 'عاش يا أشطر كتكوت! بجد فخورين بيك 🎉';
                iconHtml = '<i class="fa-solid fa-trophy text-6xl text-yellow-500 bounce"></i>';
            } else if (percentage >= 50) {
                resultMsg = 'بطل وعديت، بس تقدر تجيب أحسن من كده! 💪';
                iconHtml = '<i class="fa-solid fa-medal text-6xl text-blue-500"></i>';
            } else {
                resultMsg = 'متزعلش نفسك، راجع المادة وجرب تاني وأكيد هتقفلها! 💙';
                iconHtml = '<i class="fa-solid fa-rotate-right text-6xl text-orange-400"></i>';
            }

            resultContainer.innerHTML = `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 md:p-12 text-center mt-10 relative overflow-hidden animate-in zoom-in-95 duration-500">
                    <div class="absolute top-0 left-0 w-full h-2 ${percentage >= 50 ? 'bg-green-500' : 'bg-orange-500'}"></div>
                    
                    <div class="mb-6">
                        ${iconHtml}
                    </div>
                    
                    <h2 class="text-2xl md:text-4xl font-bold text-slate-800 mb-4">${resultMsg}</h2>
                    
                    <div class="bg-slate-50 border border-slate-100 rounded-2xl p-6 mb-8 inline-block min-w-[250px]">
                        <p class="text-slate-500 font-bold mb-2">نتيجتك في المادة</p>
                        <p class="text-4xl font-black ${percentage >= 50 ? 'text-green-600' : 'text-orange-600'}">
                            ${score} <span class="text-2xl text-slate-400">/ ${currentSubjectQuestions.length}</span>
                        </p>
                        <p class="mt-2 text-sm font-bold text-slate-400">النسبة: ${percentage}%</p>
                    </div>

                    <div class="flex flex-col md:flex-row justify-center gap-4">
                        <button onclick="startQuiz()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-8 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-rotate-right"></i> عيد من تاني
                        </button>
                        <button onclick="goHome()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-orange-500/30 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-house"></i> الرجوع للمواد
                        </button>
                    </div>
                </div>
            `;
        }

        // دالة بناء كروت المواد في الصفحة الرئيسية
        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = ''; 

            SUBJECTS.forEach(subject => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-2 transition-all duration-300 cursor-pointer group relative overflow-hidden";
                card.onclick = () => selectSubject(subject.id);
                
                card.innerHTML = `
                    <div class="absolute top-0 right-0 w-24 h-24 bg-orange-50 rounded-bl-full -z-10 transition-transform duration-500 group-hover:scale-150"></div>
                    
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 flex items-center justify-center bg-orange-100 text-orange-600 rounded-2xl group-hover:bg-orange-500 group-hover:text-white transition-colors duration-300 shadow-sm">
                            <i class="fa-solid ${subject.icon} text-2xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <div class="bg-slate-50 text-slate-500 text-xs font-bold px-3 py-1 rounded-lg border border-slate-100">
                            الفرقة الرابعة
                        </div>
                    </div>
                    
                    <h3 class="text-xl font-bold mb-2 text-slate-800 leading-tight">
                        ${subject.name}
                    </h3>
                    
                    <div class="mt-4 flex items-center gap-2 ${QUESTIONS_DB[subject.id] ? 'text-orange-500' : 'text-slate-400'} text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity translate-x-4 group-hover:translate-x-0 duration-300">
                        <span>${QUESTIONS_DB[subject.id] ? 'ابدأ المراجعة' : 'قريباً'}</span>
                        <i class="fa-solid ${QUESTIONS_DB[subject.id] ? 'fa-arrow-left' : 'fa-lock'} text-xs"></i>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- تهيئة التطبيق عند التحميل ---
        window.onload = () => {
            renderSubjects();
        };

    </script>
</body>
</html>
